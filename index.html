<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기분 맞춤형 책 처방전</title>
    <style>
        /* 기본 디자인 및 반응형 웹 설정 */
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(142, 159, 175, 0.15);
            width: 90%;
            max-width: 480px;
            text-align: center;
            box-sizing: border-box;
        }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 10px; font-weight: 800; }
        p { color: #7f8c8d; font-size: 15px; margin-bottom: 30px; line-height: 1.5; }
        
        /* 버튼 스타일 */
        .btn {
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 14px 25px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            width: 100%;
            box-shadow: 0 4px 10px rgba(74, 144, 226, 0.2);
        }
        .btn:hover { 
            background-color: #357abd; 
            transform: translateY(-1px);
        }

        /* 화면 전환용 클래스 */
        .page { display: none; }
        .active { display: block; }

        /* 감정 선택 그리드 스타일 */
        .emotion-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }
        .emotion-item {
            background-color: #f8fafc;
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: all 0.2s ease;
            border: 2px solid #e2e8f0;
            color: #475569;
        }
        .emotion-item:hover { 
            background-color: #f1f5f9; 
            border-color: #cbd5e1;
        }
        .emotion-item.selected {
            background-color: #eff6ff;
            border-color: #3b82f6;
            color: #1d4ed8;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1);
        }

        /* [디벨롭 1번] 진짜 약국 처방전/약 봉투 스타일 디자인 */
        .prescription-box {
            background-color: #fff;
            border: 2px dashed #3b82f6;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
            position: relative;
            background-image: radial-gradient(#3b82f6 0.5px, transparent 0.5px), radial-gradient(#3b82f6 0.5px, #fff 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            background-color: rgba(240, 246, 255, 0.4);
        }
        .rx-header {
            border-bottom: 2px solid #3b82f6;
            padding-bottom: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .rx-title {
            font-size: 20px;
            font-weight: 900;
            color: #1d4ed8;
            letter-spacing: 2px;
        }
        .rx-meta {
            font-size: 12px;
            color: #64748b;
            line-height: 1.4;
            text-align: right;
        }
        
        /* 처방된 책 카드 스타일 */
        .book-card {
            background-color: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .book-card:last-child { margin-bottom: 0; }
        
        /* [디벨롭 4번] 마우스 커서를 올리면 클릭할 수 있음을 보여주는 스타일 */
        .book-title-link { 
            font-size: 17px; 
            font-weight: bold; 
            color: #1e293b; 
            margin-bottom: 6px;
            display: inline-block;
            text-decoration: none;
            transition: color 0.2s;
        }
        .book-title-link:hover {
            color: #3b82f6;
            text-decoration: underline;
        }
        .book-author { font-size: 13px; color: #64748b; margin-bottom: 10px; }
        .book-info-row {
            font-size: 13px;
            color: #475569;
            line-height: 1.5;
            background-color: #f8fafc;
            padding: 10px;
            border-radius: 6px;
            border-left: 3px solid #64748b;
            margin-top: 6px;
        }
        .book-info-row strong { color: #1e293b; }
        
        .search-tip {
            font-size: 11px;
            color: #94a3b8;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="page1" class="page active">
            <h1>DOC | 책 처방 프로그램</h1>
            <p style="color: #4a90e2; font-weight: bold; margin-bottom: 5px;">📖 오늘 내 기분에 맞는 책 처방전 📖</p>
            <p>기분에 따른 책을 추천해드립니다!</p>
            <button class="btn" onclick="nextPage(2)">처방받기 시작</button>
        </div>

        <div id="page2" class="page">
            <h1>현재 기분을 선택해주세요</h1>
            <p>언어학과 정은서 소장님이 당신의 감정을 분석합니다.</p>
            <div class="emotion-list">
                <div class="emotion-item" onclick="selectEmotion('지침/번아웃')">🥱 지침/번아웃</div>
                <div class="emotion-item" onclick="selectEmotion('우울/불안')">😢 우울/불안</div>
                <div class="emotion-item" onclick="selectEmotion('행복')">🥰 행복</div>
                <div class="emotion-item" onclick="selectEmotion('차분')">🧘 차분</div>
                <div class="emotion-item" onclick="selectEmotion('설렘')">💖 설렘</div>
            </div>
            <button class="btn" onclick="getPrescription()">책 처방전 발행하기</button>
        </div>

        <div id="page3" class="page">
            <h1>오늘의 책 처방 결과입니다!</h1>
            <p>학우님의 마음에 맞춰 발행된 복약 지도서입니다.</p>
            
            <div class="prescription-box">
                <div class="rx-header">
                    <div class="rx-title">處方箋 (처방전)</div>
                    <div class="rx-meta">
                        발행인: 정은서 소장<br>
                        교부일: 2026년 6월
                    </div>
                </div>
                
                <div id="result-container">
                    </div>
                
                <div class="search-tip">💡 책 제목을 클릭하면 네이버 도서 검색 페이지로 바로 연결됩니다.</div>
            </div>
            
            <button class="btn" onclick="resetPage()" style="background-color: #64748b; box-shadow: none;">다시 처방받기</button>
        </div>
    </div>

    <script>
        let selectedEmotion = "";

        // 각 기분별 책 데이터 베이스 (디벨롭 1번: 처방 사유 문장 고도화)
        const bookDatabase = {
            "지침/번아웃": [
                { title: "아무것도 하지 않을 자유", author: "피에르 자우이", usage: "공강 시간이나 하교 길에 따뜻한 음료와 함께 복용할 것.", reason: "쉼 없이 달려온 당신에게 진짜 휴식이 무엇인지 언어적 사색을 선물합니다." },
                { title: "내가 틀릴 수도 있습니다", author: "비욘 나티코 린데블라드", usage: "취침 전 하루 15분씩 마음이 고요해질 때까지 복용할 것.", reason: "지친 마음에 위로를 전하며, 완벽해야 한다는 내면의 강박을 편안하게 내려놓도록 돕습니다." },
                { title: "번아웃의 종말", author: "조나단 말레식", usage: "주말 오전 공백 시간에 조용히 독파할 것.", reason: "일과 학업의 균형을 잃은 현대 대학생들에게 일상의 의미를 재정의해 주는 명처방입니다." }
            ],
            "우울/불안": [
                { title: "죽고 싶지만 떡볶이는 먹고 싶어", author: "백세희", usage: "감정이 가라앉는 오후 시간대, 편안한 공간에서 복용할 것.", reason: "가벼운 우울감 및 불안에 시달리는 대학생들에게 따뜻한 공감과 문장 테라피를 제공합니다." },
                { title: "마음 가면", author: "브레네 브라운", usage: "불안감이 밀려올 때마다 마음을 진정시키며 수시로 복용할 것.", reason: "나의 취약함을 솔직하게 인정하고, 불안을 다스리는 단단한 내면의 힘을 기르게 합니다." },
                { title: "불안", author: "알랭 드 보통", usage: "시험 기간 직후 혹은 생각이 너무 많아 잠이 오지 않을 때 복용할 것.", reason: "우리가 왜 불안해하는지 구조적 원인을 명쾌하게 짚어내어 심리적 안정을 유도합니다." }
            ],
            "행복": [
                { title: "행복의 기원", author: "서은국", usage: "햇살이 좋은 날 야외 벤치나 카페에서 가볍게 복용할 것.", reason: "진화론적 관점에서 행복의 본질을 흥미롭게 풀어내어 긍정적 사고를 심화시킵니다." },
                { title: "꾸뻬 씨의 행복 여행", author: "프랑수아 를로르", usage: "여행을 떠나기 전이나 새로운 시작을 앞두고 기분 좋게 복용할 것.", reason: "정신과 의사의 여정을 통해 일상 속에 숨겨진 소소한 행복의 비밀을 일깨워줍니다." },
                { title: "꾸준해서 기대되는 사람", author: "김종원", usage: "아침에 눈을 떠서 하루를 시작하는 에너지가 필요할 때 복용할 것.", reason: "밝고 긍정적인 언어적 에너지를 가득 채워주어 내일에 대한 기대감을 높여줍니다." }
            ],
            "차분": [
                { title: "고요할수록 밝아지는 것들", author: "혜민", usage: "소음이 없는 조용한 서재나 공강 시간에 차분히 복용할 것.", reason: "조용히 나 자신을 돌아보고 마음속 복잡한 소음들을 깨끗하게 지워주는 따뜻한 에세이입니다." },
                { title: "월든", author: "헨리 데이비드 소로", usage: "비 오는 날 창가에 앉아 빗소리와 함께 깊게 사색하며 복용할 것.", reason: "자연의 문장 속에서 현대 사회의 복잡함을 잊고 극도의 평온함과 사색을 즐길 수 있습니다." },
                { title: "조용히 이기는 사람들", author: "실비아 뢰켄", usage: "자기계발이나 내면 성찰이 필요할 때 정독할 것.", reason: "차분하고 내향적인 사람만이 가질 수 있는 강력한 내면의 언어와 소통 방식을 조명합니다." }
            ],
            "설렘": [
                { title: "보통의 존재", author: "이석원", usage: "마음이 몽글몽글해지는 저녁 시간, 감성적인 음악과 함께 복용할 것.", reason: "일상의 평범한 순간들을 감각적인 언어로 재해석하여 설레는 감정을 극대화합니다." },
                { title: "한여름 밤의 꿈", author: "윌리엄 셰익스피어", usage: "주말이나 방학 시즌, 환상적인 상상이 필요할 때 복용할 것.", reason: "시대를 초월한 로맨스와 유쾌한 희극성을 통해 마음속에 기분 좋은 설렘을 심어줍니다." },
                { title: "방구석 미술관", author: "조원재", usage: "새로운 지적 자극과 예술적 영감을 얻고 싶을 때 수시로 복용할 것.", reason: "화가들의 숨겨진 로맨스와 반전 스토리를 통해 지적인 재미와 예술적 설렘을 동시에 선사합니다." }
            ]
        };

        function nextPage(pageNumber) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById('page' + pageNumber).classList.add('active');
        }

        function selectEmotion(emotion) {
            selectedEmotion = emotion;
            document.querySelectorAll('.emotion-item').forEach(item => {
                item.classList.remove('selected');
                if(item.innerText.includes(emotion)) {
                    item.classList.add('selected');
                }
            });
        }

        function getPrescription() {
            if (selectedEmotion === "") {
                alert("현재 기분을 먼저 선택해주셔야 처방전 발행이 가능합니다! 💊");
                return; 
            }

            const bookList = bookDatabase[selectedEmotion];
            const shuffled = bookList.sort(() => 0.5 - Math.random());
            const final_books = shuffled.slice(0, 2); 

            const resultContainer = document.getElementById('result-container');
            resultContainer.innerHTML = ""; 

            final_books.forEach((book, index) => {
                const card = document.createElement('div');
                card.className = 'book-card';
                
                // [디벨롭 4번] 네이버 도서 검색 링크 연동 (자동 검색 URL 템플릿 적용)
                const searchUrl = `https://search.shopping.naver.com/book/search?query=${encodeURIComponent(book.title)}`;
                
                // [디벨롭 1번] 약 봉투/처방전 서식 스타일로 정보 맵핑
                card.innerHTML = `
                    <a href="${searchUrl}" target="_blank" class="book-title-link" title="네이버 도서에서 검색하기">
                        ${index + 1}. 📋 ${book.title}
                    </a>
                    <div class="book-author">저자: ${book.author} 소장</div>
                    <div class="book-info-row">
                        <strong>[용법/용량]</strong> ${book.usage}
                    </div>
                    <div class="book-info-row" style="border-left-color: #3b82f6;">
                        <strong>[처방 사유]</strong> ${book.reason}
                    </div>
                `;
                resultContainer.appendChild(card);
            });

            nextPage(3);
        }

        function resetPage() {
            selectedEmotion = "";
            document.querySelectorAll('.emotion-item').forEach(item => item.classList.remove('selected'));
            nextPage(1);
        }
    </script>
</body>
</html>
